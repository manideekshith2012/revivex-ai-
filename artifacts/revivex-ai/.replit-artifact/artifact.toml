kind = "web"
previewPath = "/"
title = "ReviveX AI"
version = "1.0.0"
id = "artifacts/revivex-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23383

[services.development]
run = "pnpm --filter @workspace/revivex-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/revivex-ai", "run", "build" ]
publicDir = "artifacts/revivex-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23383"
BASE_PATH = "/"
